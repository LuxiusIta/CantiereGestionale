    <!-- GitHub Pages SPA Path Recovery -->
    <script type="text/javascript">
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>

<body translate="no" class="notranslate">
    <!-- REGISTRAZIONE SERVICE WORKER (Universale per Locale e Produzione) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                // Usiamo il percorso basato sulla configurazione del progetto
                var swPath = '/CantiereGestionale/sw.js';
                var scope = '/CantiereGestionale/';

                // Se siamo in locale e il percorso sopra dovesse fallire (es. se Vite non usa il base in dev),
                // il catch gestirà l'errore o possiamo fare un check preventivo.
                navigator.serviceWorker.register(swPath, { scope: scope })
                    .then(function(reg) {
                        console.log('[PWA] Service Worker registrato:', reg.scope);
                    })
                    .catch(function(err) {
                        // Fallback per ambienti di sviluppo che non rispettano il base path
                        console.warn('[PWA] Prima registrazione fallita, provo con fallback root...');
                        navigator.serviceWorker.register('/sw.js', { scope: '/' })
                            .then(function(r) { console.log('[PWA] Service Worker registrato (fallback):', r.scope); })
                            .catch(function(e) { console.error('[PWA] Errore finale SW:', e); });
                    });
            });
        }
    </script>
    <!-- Il "root" è dove React inietterà tutto il nostro codice -->
    <div id="root"></div>
